<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudia Stoll - Identity through UI/UX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
  <script src="js/nav-component.js" defer></script>
  <script src="js/footer-component.js" defer></script>
  <script src="js/future.js" defer></script>
</head>
<body>

  <header>
    <site-nav></site-nav>
  </header>  

    <!-- MAIN -->
    <main class="content">
      <!-- Pause Animation -->
      <button class="hero-pause-btn" aria-label="Animation pausieren">⏸</button>
      <span class="hero-pause-label">Pause me</span>
      <section class="hero">          
          <!-- Designerin -->
          <div class="hero-slide hero-design active">
            <div class="bg-container-profile-pic">
              <img
                class="profile-pic"
                src="imagery/Designer.png"
                alt="Claudia Stoll - UI/UX Designer"
                tabindex="-1"
              />
            </div>
            <div class="hero-text">             
              <p class="typewriter-title"></p>
            </div>
          </div>

          <!-- Developerin -->
          <div class="hero-slide hero-dev">
            <div class="hero-text">
              <p class="typewriter-title"></p>
            </div>
            <div class="bg-container-profile-pic">
              <img
                class="profile-pic"
                src="imagery/Developer.png"
                alt="Claudia Stoll - Frontend Developer"
                tabindex="-1"
              />
            </div>
          </div>
        </section>

    </main>
    
    <!-- FOOTER -->
      <footer> 
        <site-footer></site-footer>
      </footer>
  </body>
</html>
